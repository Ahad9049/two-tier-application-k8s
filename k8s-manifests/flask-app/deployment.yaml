apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
  namespace: flask-app
  labels:
    app: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app  
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers: 
        - name: flask-app
          image: abdulahad9049/flask-app-k8s:v1
          env:
            - name: MYSQL_HOST
              value: "mysql-service.mysql-db.svc.cluster.local"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_DB   
              value: "mysql"
            - name: MYSQL_PASSWORD
              value: "admin"
          ports:
            - containerPort: 5000