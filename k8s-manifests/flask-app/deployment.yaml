apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment
  namespace: flask-app
  labels:
    app: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app  
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers: 
      - name: flask-app
        image: abdulahad9049/flask-app-k8s:v1.0
        ports:
        - containerPort: 5000
